<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUT Demo</title>
    <style>
        /* ===== Neon Darkroom — 霓虹暗房 ===== */
        :root {
            --bg: #050508;
            --card-bg: #0a0a10;
            --card-border: oklch(100% 0 0 / 0.05);
            --body-bg: #08080e;
            --text-dim: oklch(100% 0 0 / 0.25);
            --text-mid: oklch(100% 0 0 / 0.55);
            --text-bright: oklch(100% 0 0 / 0.92);
            --neon: oklch(78% 0.18 58);
            --neon-glow: oklch(78% 0.18 58 / 0.5);
            --neon-dim: oklch(78% 0.18 58 / 0.12);
            --neon-pink: oklch(65% 0.2 0);
            --neon-pink-glow: oklch(65% 0.2 0 / 0.4);
            --divider: oklch(100% 0 0 / 0.04);
            --radius: 6px;
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            --font-mono: "SF Mono", "JetBrains Mono", monospace;
        }

        * { margin:0; padding:0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-mid);
            padding: 0px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* ---- Header (设备状态 + 保存) ---- */
        .card-header {
            padding: 14px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--divider);
            gap: 8px;
            flex-shrink: 0;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ---- Footer (风格选择) ---- */
        .card-footer {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            border-top: 1px solid var(--divider);
            flex-shrink: 0;
        }

        .card-footer-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .card-footer-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #styleBtn {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: default;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        #styleBtn.enabled {
            color: var(--neon);
            cursor: pointer;
            text-shadow: 0 0 12px var(--neon-glow);
        }

        #styleBtn.enabled:hover {
            color: #fff;
            text-shadow: 0 0 16px var(--neon-glow);
        }

        #styleBtn.enabled:active {
            transform: scale(0.97);
        }

        .clear-btn {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: default;
            padding: 8px 16px;
            border: 1px solid var(--divider);
            border-radius: 4px;
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .clear-btn.enabled {
            color: var(--neon-pink);
            border-color: oklch(65% 0.2 0 / 0.2);
            cursor: pointer;
            text-shadow: 0 0 10px var(--neon-pink-glow);
        }

        .clear-btn.enabled:hover {
            background: oklch(65% 0.2 0 / 0.08);
            border-color: oklch(65% 0.2 0 / 0.5);
            box-shadow: 0 0 20px oklch(65% 0.2 0 / 0.15);
        }

        .clear-btn.enabled:active {
            transform: scale(0.97);
        }

        /* ---- Body ---- */
        .card-body {
            position: relative;
            flex: 1;
            min-height: 0;
            background: var(--body-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .card-body:hover {
            background: #0c0c14;
        }

        .card-body.drag-over {
            background: oklch(78% 0.18 58 / 0.03);
            box-shadow: inset 0 0 0 2px oklch(78% 0.18 58 / 0.3);
        }

        .card-body canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .card-body canvas.visible {
            display: block;
        }

        .upload-placeholder {
            text-align: center;
            pointer-events: none;
        }

        .upload-placeholder .icon {
            font-size: 48px;
            margin-bottom: 14px;
            opacity: 0.35;
        }

        .upload-placeholder .main-text {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .upload-placeholder .hint {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: oklch(100% 0 0 / 0.15);
        }

        .card-body.has-image .upload-placeholder {
            display: none;
        }

        .card-body input[type="file"] { display: none; }

        /* ---- Loading Overlay ---- */
        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: oklch(0% 0 0 / 0.72);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .loading-overlay.visible {
            display: flex;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid oklch(100% 0 0 / 0.06);
            border-top-color: var(--neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 18px var(--neon-glow), 0 0 40px oklch(78% 0.18 58 / 0.12);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon-glow);
            user-select: none;
            -webkit-user-select: none;
        }

        .mode-btn {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            padding: 9px 14px;
            border: 1px solid var(--divider);
            border-radius: 4px;
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        .mode-btn:hover {
            color: var(--text-mid);
            border-color: oklch(100% 0 0 / 0.15);
            background: oklch(100% 0 0 / 0.03);
        }

        .mode-btn.selected {
            color: var(--neon);
            border-color: oklch(78% 0.18 58 / 0.4);
            background: var(--neon-dim);
            text-shadow: 0 0 10px var(--neon-glow);
            box-shadow: 0 0 16px oklch(78% 0.18 58 / 0.08);
        }

        .mode-btn.disabled {
            color: oklch(100% 0 0 / 0.08);
            cursor: default;
            pointer-events: none;
            border-color: var(--divider);
        }

        /* ---- ZINK dropdown ---- */
        .mode-select {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            padding: 9px 14px;
            border: 1px solid var(--divider);
            border-radius: 4px;
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            font-family: inherit;
            min-width: 120px;
        }

        .mode-select:hover {
            color: var(--text-mid);
            border-color: oklch(100% 0 0 / 0.15);
            background: oklch(100% 0 0 / 0.03);
        }

        .mode-select:focus {
            border-color: oklch(78% 0.18 58 / 0.4);
            box-shadow: 0 0 12px oklch(78% 0.18 58 / 0.1);
        }

        .mode-select.selected {
            color: var(--neon);
            border-color: oklch(78% 0.18 58 / 0.4);
            background: var(--neon-dim);
            text-shadow: 0 0 10px var(--neon-glow);
            box-shadow: 0 0 16px oklch(78% 0.18 58 / 0.08);
        }

        .mode-select.disabled {
            color: oklch(100% 0 0 / 0.08);
            cursor: default;
            pointer-events: none;
            border-color: var(--divider);
            opacity: 0.5;
        }

        .mode-select option {
            background: #0a0a10;
            color: #ccc;
        }

        /* ---- Save Button ---- */
        .save-btn {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: default;
            padding: 9px 14px;
            border: 1px solid var(--divider);
            border-radius: 4px;
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }

        .save-btn.enabled {
            color: var(--neon);
            border-color: oklch(78% 0.18 58 / 0.4);
            cursor: pointer;
            text-shadow: 0 0 10px var(--neon-glow);
            box-shadow: 0 0 16px oklch(78% 0.18 58 / 0.08);
        }

        .save-btn.enabled:hover {
            background: var(--neon-dim);
            border-color: oklch(78% 0.18 58 / 0.6);
            box-shadow: 0 0 24px oklch(78% 0.18 58 / 0.15);
        }

        .save-btn.enabled:active {
            transform: scale(0.97);
        }

        /* ---- LUT Panel ---- */
        .lut-panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: oklch(0% 0 0 / 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .lut-panel-overlay.visible {
            display: flex;
        }

        .lut-panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid oklch(78% 0.18 58 / 0.12);
            width: min(90vw, 720px);
            max-height: 82vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .lut-panel-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--divider);
            flex-shrink: 0;
        }

        .lut-panel-header h3 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 8px var(--neon-glow);
        }

        .lut-panel-close {
            font-size: 18px;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .lut-panel-close:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink-glow);
        }

        .lut-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .lut-panel-body::-webkit-scrollbar {
            display: none;
        }

        .lut-category {
            margin-bottom: 14px;
        }

        .lut-category-title {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: oklch(78% 0.18 58 / 0.45);
            padding: 0 0 8px;
            text-shadow: 0 0 6px oklch(78% 0.18 58 / 0.15);
        }

        .lut-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .lut-item {
            padding: 6px 14px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text-mid);
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            border: 1px solid var(--divider);
            white-space: nowrap;
        }

        .lut-item:hover {
            background: oklch(100% 0 0 / 0.04);
            color: var(--text-bright);
            border-color: oklch(100% 0 0 / 0.12);
        }

        .lut-item.selected {
            color: var(--neon);
            background: var(--neon-dim);
            border-color: oklch(78% 0.18 58 / 0.3);
            text-shadow: 0 0 6px var(--neon-glow);
        }

        .lut-item .check {
            color: var(--neon);
            font-size: 10px;
            text-shadow: 0 0 6px var(--neon-glow);
        }

        .lut-item:not(.selected) .check {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="image-card">
        <div class="card-header">
            <div class="card-header-left">
                <span class="mode-btn selected" data-mode="original">无设备</span>
                <select class="mode-select disabled" id="zinkSelect">
                    <option value="">ZINK</option>
                    <option value="zink">ZINK v1.1</option>
                    <option value="zink2">ZINK v1.2</option>
                    <option value="zink3">ZINK v1.3</option>
                </select>
                <span class="mode-btn disabled" data-mode="led">LED</span>
            </div>
            <div class="card-header-right">
                <span class="save-btn" id="saveBtn">保存</span>
            </div>
        </div>
        <div class="card-body" id="cardBody">
            <canvas id="canvasOut" class="visible"></canvas>
            <div class="upload-placeholder" id="placeholder">
                <div class="icon">📂</div>
                <div class="main-text">点击此处选择本地图片</div>
                <div class="hint">支持 JPG / PNG / WebP</div>
            </div>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <div class="loading-text">加载风格中</div>
            </div>
            <input type="file" id="imageInput" accept="image/*">
            <input type="file" id="lutInput" accept=".cube,text/plain" style="display:none">
        </div>
        <div class="card-footer" id="cardFooter">
            <div class="card-footer-left">
                <span id="styleBtn">选择风格</span>
            </div>
            <div class="card-footer-right">
                <span class="clear-btn" id="clearBtn">清除风格</span>
            </div>
        </div>
    </div>

</div>

<!-- LUT Selector Panel -->
<div class="lut-panel-overlay" id="lutPanelOverlay">
    <div class="lut-panel">
        <div class="lut-panel-header">
            <h3>选择 LUT 风格</h3>
            <span class="lut-panel-close" id="lutPanelClose">✕</span>
        </div>
        <div class="lut-panel-body" id="lutPanelBody">
        </div>
    </div>
</div>

<script>
    // ---- LUT data loaded from lut-list.json ----
    const LUT_BASE = '.';
    let lutIndex = null;
    let categoryOrder = null;

    async function loadLutIndex() {
        try {
            const resp = await fetch('lut-list.json?v=2');
            if (!resp.ok) throw new Error('Failed to load lut-list.json');
            const data = await resp.json();
            lutIndex = {};
            const raw = data.categories || {};
            for (const key of Object.keys(raw)) {
                lutIndex[key.toLowerCase()] = raw[key];
            }
            categoryOrder = (data.order || Object.keys(lutIndex)).map(k => k.toLowerCase());
        } catch (e) {
            console.error('Failed to load lut-list.json:', e);
            lutIndex = {};
            categoryOrder = [];
        }
    }

    async function fetchLutFile(path) {
        const url = LUT_BASE + '/' + path;
        let resp = await fetch(url);
        if (!resp.ok) {
            const lowerUrl = LUT_BASE + '/' + path.toLowerCase();
            resp = await fetch(lowerUrl);
        }
        if (!resp.ok) throw new Error('Failed to load: ' + path);
        return await resp.text();
    }

    async function loadLutContent(category, filename) {
        const path = category + '/' + filename;
        const text = await fetchLutFile(path);
        return text;
    }

    // Initialize
    loadLutIndex();

    const cardBody      = document.getElementById('cardBody');
    const styleBtn      = document.getElementById('styleBtn');
    const clearBtn      = document.getElementById('clearBtn');
    const saveBtn       = document.getElementById('saveBtn');
    const canvasOut     = document.getElementById('canvasOut');
    const placeholder   = document.getElementById('placeholder');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const imageInput    = document.getElementById('imageInput');
    const lutInput      = document.getElementById('lutInput');
    const lutPanelOverlay = document.getElementById('lutPanelOverlay');
    const lutPanelBody  = document.getElementById('lutPanelBody');
    const lutPanelClose = document.getElementById('lutPanelClose');
    const ctx           = canvasOut.getContext('2d', { willReadFrequently: true });

    let sourceImage = null;
    let lutData = null;           // filter LUT (from panel)
    let deviceLutData = null;     // device LUT (zink/led)
    let hasImage = false;
    let selectedLutKey = null;
    let deviceMode = 'original';   // 'original' | 'zink' | 'zink2' | 'zink3' | 'led'
    let deviceLoaded = { zink: false, zink2: false, zink3: false, led: false };

    // ---- Parse .cube file ----
    function parseCubeFile(text) {
        // Normalize line endings and trim BOM
        text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/^\uFEFF/, '');
        const lines = text.split('\n').map(l => l.trim());
        let size = 0;
        const values = [];

        for (const line of lines) {
            if (!line || line.startsWith('#') || line.startsWith('//')) continue;
            const parts = line.split(/\s+/);
            if (parts[0] === 'TITLE') continue;
            if (parts[0] === 'DOMAIN_MIN' || parts[0] === 'DOMAIN_MAX') continue;
            if (parts[0] === 'LUT_3D_SIZE') {
                size = parseInt(parts[1]);
                continue;
            }
            if (parts.length >= 3) {
                const r = parseFloat(parts[0]);
                const g = parseFloat(parts[1]);
                const b = parseFloat(parts[2]);
                if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
                    values.push(r, g, b);
                }
            }
        }

        if (!size || values.length !== size * size * size * 3) {
            console.error('parseCubeFile: size=' + size + ', values=' + values.length + ', expected=' + (size * size * size * 3) + ', textLen=' + text.length + ', lines=' + lines.length);
            throw new Error('Invalid .cube file (size=' + size + ', values=' + values.length + ')');
        }
        return { size, table: new Float32Array(values) };
    }

    // ---- Apply 3D LUT to canvas pixel data ----
    function applyLUTToPixels(srcPixels, w, h, lut) {
        const { size, table } = lut;
        const maxIdx = size - 1;
        const n = size * size;
        const dst = new Uint8ClampedArray(srcPixels.length);

        for (let i = 0; i < srcPixels.length; i += 4) {
            const r = srcPixels[i]     / 255;
            const g = srcPixels[i + 1] / 255;
            const b = srcPixels[i + 2] / 255;
            const a = srcPixels[i + 3];

            const rf = Math.min(r * maxIdx, maxIdx);
            const gf = Math.min(g * maxIdx, maxIdx);
            const bf = Math.min(b * maxIdx, maxIdx);

            const r0 = Math.floor(rf);
            const g0 = Math.floor(gf);
            const b0 = Math.floor(bf);
            const r1 = Math.min(r0 + 1, maxIdx);
            const g1 = Math.min(g0 + 1, maxIdx);
            const b1 = Math.min(b0 + 1, maxIdx);

            const dr = rf - r0;
            const dg = gf - g0;
            const db = bf - b0;

            const idx000 = (b0 * n + g0 * size + r0) * 3;
            const idx100 = (b0 * n + g0 * size + r1) * 3;
            const idx010 = (b0 * n + g1 * size + r0) * 3;
            const idx110 = (b0 * n + g1 * size + r1) * 3;
            const idx001 = (b1 * n + g0 * size + r0) * 3;
            const idx101 = (b1 * n + g0 * size + r1) * 3;
            const idx011 = (b1 * n + g1 * size + r0) * 3;
            const idx111 = (b1 * n + g1 * size + r1) * 3;

            for (let c = 0; c < 3; c++) {
                const c00 = table[idx000 + c] * (1 - dr) + table[idx100 + c] * dr;
                const c01 = table[idx001 + c] * (1 - dr) + table[idx101 + c] * dr;
                const c10 = table[idx010 + c] * (1 - dr) + table[idx110 + c] * dr;
                const c11 = table[idx011 + c] * (1 - dr) + table[idx111 + c] * dr;
                const c0  = c00 * (1 - dg) + c10 * dg;
                const c1  = c01 * (1 - dg) + c11 * dg;
                const val = c0 * (1 - db) + c1 * db;
                dst[i + c] = Math.round(Math.max(0, Math.min(1, val)) * 255);
            }
            dst[i + 3] = a;
        }
        return dst;
    }

    function render() {
        if (!sourceImage) return;
        const w = sourceImage.naturalWidth || sourceImage.width;
        const h = sourceImage.naturalHeight || sourceImage.height;
        canvasOut.width = w;
        canvasOut.height = h;

        // Step 1: draw source image
        ctx.drawImage(sourceImage, 0, 0, w, h);
        let imageData = ctx.getImageData(0, 0, w, h);

        // Step 2: apply filter LUT if selected
        if (lutData) {
            imageData.data.set(applyLUTToPixels(imageData.data, w, h, lutData));
        }

        // Step 3: apply device LUT if not in original mode
        if (deviceMode !== 'original' && deviceLutData) {
            imageData.data.set(applyLUTToPixels(imageData.data, w, h, deviceLutData));
        }

        ctx.putImageData(imageData, 0, 0);
    }

    // ---- LUT Panel ----
    function buildLutPanel() {
        lutPanelBody.innerHTML = '';
        if (!lutIndex) {
            lutPanelBody.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">加载 LUT 列表中...</div>';
            return;
        }
        const categories = (categoryOrder || Object.keys(lutIndex)).map(key => {
            return { key: key, label: key };
        });

        for (const cat of categories) {
            const catDiv = document.createElement('div');
            catDiv.className = 'lut-category';
            catDiv.innerHTML = '<div class="lut-category-title">' + cat.label + '</div>';
            
            const tagsDiv = document.createElement('div');
            tagsDiv.className = 'lut-tags';
            
            const files = lutIndex[cat.key] || [];
            for (const fname of files) {
                const display = fname.replace(/\.(cube|CUBE)$/, '');
                const item = document.createElement('div');
                item.className = 'lut-item';
                if (selectedLutKey === cat.key + '/' + fname) {
                    item.classList.add('selected');
                }
                item.innerHTML = '<span>' + display + '</span><span class="check">✓</span>';
                item.addEventListener('click', () => {
                    selectLut(cat.key, fname);
                });
                tagsDiv.appendChild(item);
            }
            catDiv.appendChild(tagsDiv);
            lutPanelBody.appendChild(catDiv);
        }
    }

    async function selectLut(category, filename) {
        // Close panel immediately and show loading overlay
        lutPanelOverlay.classList.remove('visible');
        const display = filename.replace(/\.(cube|CUBE)$/, '');
        styleBtn.textContent = category + ' - ' + display;
        loadingOverlay.classList.add('visible');

        try {
            const text = await loadLutContent(category, filename);
            lutData = parseCubeFile(text);
            selectedLutKey = category + '/' + filename;
            loadingOverlay.classList.remove('visible');
            render();
        } catch (err) {
            loadingOverlay.classList.remove('visible');
            alert('LUT 加载失败: ' + err.message);
            styleBtn.textContent = '选择风格';
        }
    }

    function openLutPanel() {
        if (!hasImage) return;
        buildLutPanel();
        lutPanelOverlay.classList.add('visible');
    }

    lutPanelClose.addEventListener('click', () => {
        lutPanelOverlay.classList.remove('visible');
    });

    lutPanelOverlay.addEventListener('click', (e) => {
        if (e.target === lutPanelOverlay) {
            lutPanelOverlay.classList.remove('visible');
        }
    });

    // ---- Device LUT loading ----
    async function loadDeviceLut(mode) {
        if (mode === 'original' || !mode) return;
        if (deviceLoaded[mode]) return;
        // Map mode to filename
        const fileMap = { zink: 'zink.cube', zink2: 'zink2.cube', zink3: 'zink3.cube', led: 'led.cube' };
        const filename = fileMap[mode] || (mode + '.cube');
        try {
            const text = await fetchLutFile('device/' + filename);
            const parsed = parseCubeFile(text);
            window['_lut_' + mode] = parsed;
            deviceLoaded[mode] = true;
        } catch (err) {
            console.error('Failed to load device LUT (' + mode + '):', err);
            alert('设备 LUT 加载失败 (' + mode + '): ' + err.message);
        }
    }

    function getDeviceLut(mode) {
        return window['_lut_' + mode] || null;
    }

    // ---- Device mode buttons (original + LED) ----
    const modeBtns = document.querySelectorAll('.mode-btn');
    const zinkSelect = document.getElementById('zinkSelect');

    function setDeviceMode(mode) {
        if (deviceMode === mode) return;
        deviceMode = mode;
        deviceLutData = getDeviceLut(mode);

        // Update original/LED button states
        modeBtns.forEach(b => {
            if (b.dataset.mode === mode) {
                b.classList.add('selected');
            } else {
                b.classList.remove('selected');
            }
        });

        // Update ZINK dropdown
        if (mode && mode.startsWith('zink')) {
            zinkSelect.value = mode;
            zinkSelect.classList.add('selected');
        } else {
            zinkSelect.value = '';
            zinkSelect.classList.remove('selected');
        }

        render();
    }

    // Original + LED button clicks
    modeBtns.forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const mode = btn.dataset.mode;
            if (btn.classList.contains('disabled')) return;

            if (mode !== 'original' && !deviceLoaded[mode]) {
                btn.textContent = '加载中...';
                await loadDeviceLut(mode);
                btn.textContent = mode.toUpperCase();
            }

            setDeviceMode(mode);
        });
    });

    // ZINK dropdown change
    zinkSelect.addEventListener('change', async function(e) {
        e.stopPropagation();
        const mode = this.value;
        if (!mode) {
            setDeviceMode('original');
            return;
        }

        if (!deviceLoaded[mode]) {
            await loadDeviceLut(mode);
        }

        setDeviceMode(mode);
    });

    // Enable device buttons when image is loaded
    function enableDeviceButtons() {
        modeBtns.forEach(b => {
            if (b.dataset.mode !== 'original') {
                b.classList.remove('disabled');
            }
        });
        zinkSelect.classList.remove('disabled');
    }

    function disableDeviceButtons() {
        modeBtns.forEach(b => {
            if (b.dataset.mode !== 'original') {
                b.classList.add('disabled');
            }
        });
        zinkSelect.classList.add('disabled');
        zinkSelect.value = '';
        zinkSelect.classList.remove('selected');
        setDeviceMode('original');
        deviceLoaded = { zink: false, zink2: false, zink3: false, led: false };
    }

    // ---- Image upload ----
    function handleImageFile(file) {
        if (!file || !file.type.startsWith('image/')) {
            alert('请选择有效的图片文件（JPG / PNG / WebP）');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                sourceImage = img;
                hasImage = true;
                cardBody.classList.add('has-image');
                styleBtn.classList.add('enabled');
                clearBtn.classList.add('enabled');
                saveBtn.classList.add('enabled');
                lutData = null;
                selectedLutKey = null;
                styleBtn.textContent = '选择风格';
                canvasOut.classList.add('visible');
                enableDeviceButtons();
                render();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ---- External LUT file (fallback) ----
    function handleLutFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                lutData = parseCubeFile(e.target.result);
                selectedLutKey = null;
                styleBtn.textContent = file.name;
                render();
            } catch (err) {
                alert('无法解析 LUT 文件: ' + err.message);
            }
        };
        reader.readAsText(file);
    }

    // ---- Clear filter (keep image, remove only style LUT) ----
    function clearFilter() {
        lutData = null;
        selectedLutKey = null;
        styleBtn.textContent = '选择风格';
        render();
    }

    // ---- Full reset (clear everything) ----
    function reset() {
        sourceImage = null;
        lutData = null;
        deviceLutData = null;
        hasImage = false;
        selectedLutKey = null;

        canvasOut.classList.remove('visible');
        cardBody.classList.remove('has-image');
        ctx.clearRect(0, 0, canvasOut.width, canvasOut.height);

        styleBtn.classList.remove('enabled');
        styleBtn.textContent = '选择风格';
        clearBtn.classList.remove('enabled');
        saveBtn.classList.remove('enabled');

        disableDeviceButtons();

        imageInput.value = '';
        lutInput.value = '';
    }

    // ---- Save image ----
    function getSaveFileName() {
        const parts = [];
        // 设备状态部分
        if (deviceMode === 'original') {
            parts.push('无设备');
        } else {
            parts.push(deviceMode.toUpperCase());
        }
        // LUT 风格部分
        if (selectedLutKey) {
            const slashIdx = selectedLutKey.lastIndexOf('/');
            const category = selectedLutKey.substring(0, slashIdx);
            const filename = selectedLutKey.substring(slashIdx + 1).replace(/\.(cube|CUBE)$/, '');
            parts.push(category + '-' + filename);
        } else {
            parts.push('无风格');
        }
        return parts.join('-') + '.png';
    }

    function saveImage() {
        if (!hasImage) return;
        const link = document.createElement('a');
        link.download = getSaveFileName();
        link.href = canvasOut.toDataURL('image/png');
        link.click();
    }

    saveBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!hasImage) return;
        saveImage();
    });

    // ---- Events ----
    cardBody.addEventListener('click', (e) => {
        if (e.target === cardBody || e.target === canvasOut || e.target.closest('.upload-placeholder')) {
            imageInput.click();
        }
    });

    styleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!hasImage) return;
        openLutPanel();
    });

    clearBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!hasImage) return;
        clearFilter();
    });

    imageInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleImageFile(e.target.files[0]);
        }
    });

    lutInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleLutFile(e.target.files[0]);
        }
    });

    // Drag & drop
    cardBody.addEventListener('dragover', (e) => {
        e.preventDefault();
        cardBody.classList.add('drag-over');
    });

    cardBody.addEventListener('dragleave', () => {
        cardBody.classList.remove('drag-over');
    });

    cardBody.addEventListener('drop', (e) => {
        e.preventDefault();
        cardBody.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) {
            handleImageFile(e.dataTransfer.files[0]);
        }
    });

    // ---- Service Worker registration & background preload ----
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then((reg) => {
            console.log('[SW] Registered:', reg.scope);

            // Listen for cache-status messages from SW
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'cache-status') {
                    console.log('[SW] Cache ready: ' + event.data.cached + '/' + event.data.total + ' files');
                }
            });

            // After SW is active, trigger background preload of all cube files
            // This ensures files not yet cached get fetched and stored
            navigator.serviceWorker.ready.then(() => {
                // Ask SW for current cache status
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage('cache-status');
                }
            });
        }).catch((err) => {
            console.warn('[SW] Registration failed:', err);
        });
    }
</script>

</body>
</html>
